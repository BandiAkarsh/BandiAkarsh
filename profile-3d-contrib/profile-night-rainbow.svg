    <rect x="330" y="115" width="18" height="35" fill="url(#bar-grad-2)" rx="2"/>
    <rect x="352" y="75" width="18" height="75" fill="url(#bar-grad-3)" rx="2"/>
    <rect x="374" y="90" width="18" height="60" fill="url(#bar-grad-1)" rx="2"/>
    <rect x="396" y="55" width="18" height="95" fill="url(#bar-grad-3)" rx="2"/>
