<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="rainbow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="16%" style="stop-color:#feca57"/>
      <stop offset="33%" style="stop-color:#48dbfb"/>
      <stop offset="50%" style="stop-color:#1dd1a1"/>
      <stop offset="66%" style="stop-color:#5f27cd"/>
      <stop offset="83%" style="stop-color:#ee5a24"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
    <linearGradient id="bar-grad-1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#3d59a1"/>
    </linearGradient>
    <linearGradient id="bar-grad-2" x1="0%" y1="100%" x2="0%" y2="0%">
