name: 3D Contribution Calendar

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-3d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Generate 3D Calendar
        uses: yoshi389111/github-profile-3d-contrib@latest
        with:
          filename: profile-3d-contrib/profile-season-animate.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          # Switch remote to SSH for push
          git remote set-url origin git@github.com:${{ github.repository_owner }}/${{ github.repository_owner }}.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/*.svg
          git diff --cached --quiet || git commit -m "🎮 Update 3D contribution [skip ci]"
          git push
