name: Language Stats

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  languages:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Debug - Check token
        run: |
          echo "Token available: ${#GITHUB_TOKEN}"
          echo "User: $GITHUB_USER"
          
      - name: Debug - Test API
        run: |
          curl -s -I "https://api.github.com/users/$GITHUB_USER" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json"
          
      - name: Run language stats generator
        run: python scripts/generate_languages.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
