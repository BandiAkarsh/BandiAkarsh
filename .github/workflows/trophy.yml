name: GitHub Achievement Badges

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Generate Achievement Badges
        run: |
          mkdir -p profile

          # Create a custom achievement badges SVG using shields.io
          cat > profile/achievements.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="200" viewBox="0 0 800 200">
            <style>
              .badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
            </style>
            <rect width="800" height="200" fill="#1a1b26" rx="10"/>
            
            <!-- Title -->
            <text x="400" y="30" text-anchor="middle" fill="#7AA2F7" font-size="18" font-weight="bold" class="badge">🏆 Achievements</text>
            
            <!-- Badges Row 1 -->
            <a href="https://github.com/${{ github.repository_owner }}?tab=repositories">
              <image href="https://img.shields.io/github/stars/${{ github.repository_owner }}?style=for-the-badge&color=FFD700&labelColor=1a1b26&logo=github" x="50" y="50" width="140" height="40"/>
            </a>
            
            <a href="https://github.com/${{ github.repository_owner }}?tab=repositories">
              <image href="https://img.shields.io/github/forks/${{ github.repository_owner }}?style=for-the-badge&color=00D9FF&labelColor=1a1b26&logo=github" x="210" y="50" width="140" height="40"/>
            </a>
            
            <a href="https://github.com/${{ github.repository_owner }}?tab=packages">
              <image href="https://img.shields.io/github/followers/${{ github.repository_owner }}?style=for-the-badge&color=BB9AF7&labelColor=1a1b26&logo=github" x="370" y="50" width="140" height="40"/>
            </a>
            
            <a href="https://github.com/${{ github.repository_owner }}?tab=packages">
              <image href="https://img.shields.io/github/downloads/${{ github.repository_owner }}/total?style=for-the-badge&color=9ECE6A&labelColor=1a1b26&logo=github" x="530" y="50" width="140" height="40"/>
            </a>
            
            <!-- Badges Row 2 -->
            <a href="https://github.com/${{ github.repository_owner }}/${{ github.repository_owner }}/graphs/commit-activity">
              <image href="https://img.shields.io/github/commit-activity/w/${{ github.repository_owner }}?style=for-the-badge&color=FF9E64&labelColor=1a1b26&logo=github" x="50" y="110" width="140" height="40"/>
            </a>
            
            <a href="https://github.com/${{ github.repository_owner }}/${{ github.repository_owner }}/graphs/contributors">
              <image href="https://img.shields.io/github/last-commit/${{ github.repository_owner }}?style=for-the-badge&color=F7768E&labelColor=1a1b26&logo=github" x="210" y="110" width="140" height="40"/>
            </a>
            
            <a href="https://github.com/${{ github.repository_owner }}?tab=projects">
              <image href="https://img.shields.io/github/repo-size/${{ github.repository_owner }}?style=for-the-badge&color=7DCFFF&labelColor=1a1b26&logo=github" x="370" y="110" width="140" height="40"/>
            </a>
            
            <a href="https://github.com/${{ github.repository_owner }}/${{ github.repository_owner }}/actions">
              <image href="https://img.shields.io/github/actions/workflow/status/${{ github.repository_owner }}/${{ github.repository_owner }}/stats.yml?style=for-the-badge&color=BB9AF7&labelColor=1a1b26&logo=github" x="530" y="110" width="140" height="40"/>
            </a>
          </svg>
          EOF

      - name: Commit & Push
        run: |
          # Switch remote to SSH for push
          git remote set-url origin git@github.com:${{ github.repository_owner }}/${{ github.repository_owner }}.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/achievements.svg
          git diff --cached --quiet || git commit -m "🏆 Update achievements [skip ci]"
          git push
