name: GitHub Profile Trophy

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Generate Trophy SVG
        run: |
          mkdir -p profile
          # Fetch trophy from GitHub Profile Trophy service
          curl -sL "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=tokyonight&no-frame=false&column=6&row=2&width=800&height=200&margin-w=15&margin-h=15" \
            -o profile/trophy.svg || echo "Trophy unavailable" > profile/trophy.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg
          git diff --cached --quiet || git commit -m "🏆 Update trophy [skip ci]"
          git push
