name: GitHub Achievement Badges

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate Achievement Badges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SCRIPT: 
        run: |
          mkdir -p profile
          STARS=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/users/$USERNAME" | python3 -c "import sys,json; print(json.load(sys.stdin).get('followers', 0))" 2>/dev/null || echo "0")
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/users/$USERNAME" | python3 -c "import sys,json; print(json.load(sys.stdin).get('public_repos', 0))" 2>/dev/null || echo "0")
          export STARS REPOS
          echo "$SCRIPT" | base64 -d > gen_achievements.py
          python3 gen_achievements.py
          rm gen_achievements.py

      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/${{ github.repository_owner }}.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/achievements.svg
          git diff --cached --quiet || git commit -m "🏆 Update achievements [skip ci]"
          git push origin main
