name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate Language Stats (Lines of Code)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p profile
          
          # Fetch language data from GitHub API (lines of code)
          LANGUAGES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.repository_owner }}/languages" | \
            python3 -c "
import sys, json
data = json.load(sys.stdin)
total = sum(data.values())
for lang, bytes in sorted(data.items(), key=lambda x: x[1], reverse=True)[:6]:
    pct = (bytes / total * 100) if total > 0 else 0
    print(f'{lang}:{pct:.1f}:{bytes}')
")
          
          # Create SVG card
          cat > profile/metrics.svg << 'SVGEOF'
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="200" viewBox="0 0 400 200">
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: bold; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; }
    .pct { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; }
  </style>
  <rect width="400" height="200" fill="#1a1b26" rx="10"/>
  <text x="200" y="30" text-anchor="middle" fill="#7AA2F7" class="title">📊 Languages by Lines of Code</text>
SVGEOF
          
          # Add language bars dynamically
          Y=50
          COLORS=("#FF6B6B" "#4ECDC4" "#45B7D1" "#96CEB4" "#FFEAA7" "#DDA0DD")
          I=0
          echo "$LANGUAGES" | while IFS=: read -r lang pct bytes; do
            [ -z "$lang" ] && continue
            COLOR=${COLORS[$I]}
            BAR_WIDTH=$(echo "$pct * 3.2" | bc)
            echo "  <rect x=\"20\" y=\"$Y\" width=\"$BAR_WIDTH\" height=\"20\" fill=\"$COLOR\" rx=\"3\"/>" >> profile/metrics.svg
            echo "  <text x=\"25\" y=\"$((Y+14))\" fill=\"#1a1b26\" class=\"label\">$lang</text>" >> profile/metrics.svg
            echo "  <text x=\"$((25 + ${BAR_WIDTH%.*}))\" y=\"$((Y+14))\" fill=\"#1a1b26\" class=\"pct\">${pct}%</text>" >> profile/metrics.svg
            Y=$((Y+25))
            I=$((I+1))
          done
          
          echo "</svg>" >> profile/metrics.svg

      - name: Generate Stats Card (Total Stats)
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF&text_color=BB9AF7"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Repo Pins
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=Multimodal_LLM-Phishing-Detection&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/phishing-detection.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OpenCode Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=opencode-antigravity-auth&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/opencode-antigravity.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate TerraFork Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=Terrafork&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/terrafork.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Shannon Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=shannon&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/shannon.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Locanote Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=Locanote&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/locanote.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate P2P Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=p2p-messeging-app&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/p2p-messaging.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/${{ github.repository_owner }}.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg profile/pins/*.svg
          git diff --cached --quiet || git commit -m "📊 Update stats cards [skip ci]"
          git push origin main
