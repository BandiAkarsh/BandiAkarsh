name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Generate Stats Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF&text_color=BB9AF7"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Langs Card (by number of repos, not bytes)
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=10&hide_border=true&theme=tokyonight&bg_color=1a1b26&title_color=7AA2F7&text_color=BB9AF7&size_weight=0&count_weight=1"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Phishing Detection Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=Multimodal_LLM-Phishing-Detection&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/phishing-detection.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OpenCode Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=opencode-antigravity-auth&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/opencode-antigravity.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate TerraFork Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=Terrafork&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/terrafork.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Shannon Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=shannon&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/shannon.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Locanote Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=Locanote&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/locanote.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate P2P Pin
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=p2p-messeging-app&theme=tokyonight&hide_border=true&bg_color=1a1b26&title_color=7AA2F7&icon_color=00D9FF"
          path: profile/pins/p2p-messaging.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg profile/pins/*.svg
          git diff --cached --quiet || git commit -m "📊 Update stats cards [skip ci]"
          git push
